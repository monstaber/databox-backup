name: archive

on:
  schedule:
    # Every 30 minutes (UTC). See README for the cost rationale and for
    # notes on GitHub's notoriously sloppy scheduled-run honoring.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

# Default the job-level token to read-only. The archiver writes to Google Drive
# via its own OAuth credential; no GitHub API write is needed.
permissions:
  contents: read

# Queue overlapping runs instead of racing. Overlap is virtually impossible at
# hourly cadence, but the guard is correct and cheap.
concurrency:
  group: isds-archiver
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run archiver
        env:
          ISDS_DBID: ${{ secrets.ISDS_DBID }}
          # ISDS authentication. The archiver picks the auth path by env-var
          # presence: PEM pair wins, then PFX, else username+password. Set
          # whichever pair you use; leave the others unset (or as empty
          # secrets — empty values are treated as absent).
          ISDS_CERT_PEM_BASE64: ${{ secrets.ISDS_CERT_PEM_BASE64 }}
          ISDS_KEY_PEM_BASE64: ${{ secrets.ISDS_KEY_PEM_BASE64 }}
          ISDS_CERT_PFX_BASE64: ${{ secrets.ISDS_CERT_PFX_BASE64 }}
          ISDS_CERT_PFX_PASSPHRASE: ${{ secrets.ISDS_CERT_PFX_PASSPHRASE }}
          ISDS_USERNAME: ${{ secrets.ISDS_USERNAME }}
          ISDS_PASSWORD: ${{ secrets.ISDS_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: node dist/src/index.js
